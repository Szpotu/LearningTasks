<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Random Quote Generator</title>
</head>
<body>
    <div class="container">
        <h1 id="main-title">Welcome to Random Quote Generator</h1>
        <p id="introduce">In this app you'll be able to acknowledge with a few of well known Donald Trump quotes!</p>
    </div>
    <div class="container" id="scnd-part-grid">
        <div id="btn-container">
            <button type="button" class ='btn'id="fetcher">Generate Quote</button>
            <a class='twitter btn' id='tweet'target='_blank'rel='noopenr noreferrer'>Tweet!</a>
            <button class ='btn'type="reset" id="reset">Reset</button>
        </div>
        <div id="quote-window"></div>
        <div id="js-spinner" class="spinner hidden">
            <div class="rect1"></div>
            <div class="rect2"></div>
            <div class="rect3"></div>
            <div class="rect4"></div>
            <div class="rect5"></div>
          </div>
        
    </div>
    <script src="/Random Quote Generator/app.js"></script>
</body>
</html>
